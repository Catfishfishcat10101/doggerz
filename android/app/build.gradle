import java.io.FileInputStream
import java.util.Properties
import groovy.json.JsonSlurper

apply plugin: 'com.android.application'

// --- VERSIONING LOGIC ---
def versionFile = file("../../version.json")
def versionData = null
if (versionFile.exists()) {
    versionData = new JsonSlurper().parseText(versionFile.text)
}
def versionNameFallback = (versionData?.versionName ?: "2.1.2").toString()
def versionCodeFallback = (versionData?.versionCode ?: 212).toString()

def versionCodeRaw = System.getenv('DOGGERZ_VERSION_CODE') ?: project.findProperty('DOGGERZ_VERSION_CODE') ?: versionCodeFallback
def versionNameRaw = System.getenv('DOGGERZ_VERSION_NAME') ?: project.findProperty('DOGGERZ_VERSION_NAME') ?: versionNameFallback

def parsedVersionCode = (versionCodeRaw ?: "212").toString().trim().toInteger()

// Solo-dev safety: Only throw error if we aren't in a local dev environment
if (parsedVersionCode <= 2 && System.getenv('CI')) {
    throw new GradleException("DOGGERZ_VERSION_CODE must be a positive integer for Release. Got: ${parsedVersionCode}")
}

// --- KEYSTORE LOGIC ---
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('keystore.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = 'com.doggerz.app'
    compileSdk = rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId 'com.doggerz.app'
        minSdkVersion 24
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode parsedVersionCode
        versionName versionNameRaw
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists() && keystoreProperties['storeFile']) {
                storeFile rootProject.file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (keystorePropertiesFile.exists() && keystoreProperties['storeFile']) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir {
        // DEFENSIVE: Only look for the directory if it actually exists
        if (file('../capacitor-cordova-android-plugins/src/main/libs').exists()) {
            dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
        } else {
            dirs 'libs'
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')

    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"

    // DEFENSIVE: Only implement the project if the directory exists
    if (findProject(':capacitor-cordova-android-plugins') != null) {
        implementation project(':capacitor-cordova-android-plugins')
    }
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.exists()) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch (Exception e) {
    logger.info("Firebase not initialized: google-services.json missing.")
}
