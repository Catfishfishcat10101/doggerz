
import java.util.Properties

plugins {
    id 'com.android.application'
}

def versionFile = rootProject.file("../version.json")
if (!versionFile.exists()) {
    throw new GradleException("Missing version.json at ${versionFile.absolutePath}")
}

def versionJson = new groovy.json.JsonSlurper().parse(versionFile)
def versionNameRaw = versionJson?.versionName?.toString()?.trim()
def versionCodeRaw = versionJson?.versionCode

if (!(versionNameRaw ==~ /\d+\.\d+\.\d+/)) {
    throw new GradleException("Invalid versionName in version.json: ${versionNameRaw}")
}

if (!(versionCodeRaw instanceof Number) || versionCodeRaw.intValue() < 1) {
    throw new GradleException("Invalid versionCode in version.json: ${versionCodeRaw}")
}

def parsedVersionCode = versionCodeRaw.intValue()
def parsedVersionName = versionNameRaw
def repoRootDir = rootProject.projectDir.parentFile
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}

def resolveReleaseSigningValue = { envKey, propKey ->
    def envValue = System.getenv(envKey)?.toString()?.trim()
    if (envValue) return envValue
    def propValue = keystoreProperties.getProperty(propKey)?.toString()?.trim()
    return propValue ?: null
}

// Release keystore paths may come from env or keystore.properties and are
// accepted as absolute, repo-root-relative (recommended), or android-relative.
// This mirrors the release builder so preflight and Gradle resolve the same
// file instead of disagreeing at bundle time.
def resolveMaybeRelativeFile = { rawPath ->
    def normalizedPath = rawPath?.toString()?.trim()
    if (!normalizedPath) return null

    def directFile = new File(normalizedPath)
    if (directFile.isAbsolute()) return directFile

    def repoRelativeFile = new File(repoRootDir, normalizedPath)
    if (repoRelativeFile.exists()) return repoRelativeFile

    def androidRelativeFile = new File(rootProject.projectDir, normalizedPath)
    if (androidRelativeFile.exists()) return androidRelativeFile

    return repoRelativeFile
}

def releaseStoreFilePath = resolveReleaseSigningValue("DOGGERZ_ANDROID_KEYSTORE_PATH", "storeFile")
def releaseStorePassword = resolveReleaseSigningValue("DOGGERZ_ANDROID_KEYSTORE_PASSWORD", "storePassword")
def releaseKeyAlias = resolveReleaseSigningValue("DOGGERZ_ANDROID_KEY_ALIAS", "keyAlias")
def releaseKeyPassword = resolveReleaseSigningValue("DOGGERZ_ANDROID_KEY_PASSWORD", "keyPassword")
def releaseStoreFile = resolveMaybeRelativeFile(releaseStoreFilePath)
def releaseSigningReady = (
        releaseStoreFile &&
        releaseStoreFile.exists() &&
        releaseStorePassword &&
        releaseKeyAlias &&
        releaseKeyPassword
)

def releaseSigningIssues = []
if (!releaseStoreFilePath) releaseSigningIssues << "DOGGERZ_ANDROID_KEYSTORE_PATH/storeFile"
if (!releaseStorePassword) releaseSigningIssues << "DOGGERZ_ANDROID_KEYSTORE_PASSWORD/storePassword"
if (!releaseKeyAlias) releaseSigningIssues << "DOGGERZ_ANDROID_KEY_ALIAS/keyAlias"
if (!releaseKeyPassword) releaseSigningIssues << "DOGGERZ_ANDROID_KEY_PASSWORD/keyPassword"
if (releaseStoreFilePath && !(releaseStoreFile?.exists())) {
    releaseSigningIssues << "keystore file not found at ${releaseStoreFile?.absolutePath}"
}

android {
    namespace "com.doggerz.app"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.doggerz.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode parsedVersionCode
        versionName parsedVersionName

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables {
            useSupportLibrary true
        }
    }

    signingConfigs {
        release {
            if (releaseSigningReady) {
                storeFile releaseStoreFile
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
                enableV1Signing true
                enableV2Signing true
                enableV3Signing true
                enableV4Signing true
            }
        }
    }

    buildTypes {
        debug {
            minifyEnabled false
            shrinkResources false
        }
        release {
            minifyEnabled false
            shrinkResources false
            if (releaseSigningReady) {
                signingConfig signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    packaging {
        resources {
            excludes += [
                    'META-INF/DEPENDENCIES',
                    'META-INF/LICENSE',
                    'META-INF/LICENSE.txt',
                    'META-INF/NOTICE',
                    'META-INF/NOTICE.txt',
                    'META-INF/AL2.0',
                    'META-INF/LGPL2.1'
            ]
        }
    }
}

tasks.matching { it.name in ["assembleRelease", "bundleRelease"] }.configureEach {
    doFirst {
        if (!releaseSigningReady) {
            throw new GradleException(
                    "Release signing is not configured. Provide DOGGERZ_ANDROID_KEYSTORE_PATH, DOGGERZ_ANDROID_KEYSTORE_PASSWORD, DOGGERZ_ANDROID_KEY_ALIAS, and DOGGERZ_ANDROID_KEY_PASSWORD, or populate android/keystore.properties. Missing: ${releaseSigningIssues.join(', ')}"
            )
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')

    // Plugin dependencies are handled by capacitor.build.gradle

    implementation "androidx.core:core-ktx:${rootProject.ext.androidxCoreVersion}"
    implementation "androidx.appcompat:appcompat:${rootProject.ext.androidxAppCompatVersion}"
    implementation "com.google.android.material:material:1.12.0"
    implementation "androidx.core:core-splashscreen:${rootProject.ext.coreSplashScreenVersion}"
}

apply from: 'capacitor.build.gradle'

def googleServicesFile = file('google-services.json')
if (googleServicesFile.exists()) {
    apply plugin: 'com.google.gms.google-services'
}
