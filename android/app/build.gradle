
import java.io.FileInputStream
import java.util.Properties


buildscript {
    dependencies {
        classpath 'org.codehaus.groovy:groovy-json:3.0.13'
    }
}

import groovy.json.JsonSlurper

plugins {
    id 'com.android.application'
}

def versionFile = rootProject.file("../version.json")
if (!versionFile.exists()) {
    throw new GradleException("Missing version.json at ${versionFile.absolutePath}")
}

def versionJson = new JsonSlurper().parse(versionFile)
def versionNameRaw = versionJson?.versionName?.toString()?.trim()
def versionCodeRaw = versionJson?.versionCode

if (!(versionNameRaw ==~ /\d+\.\d+\.\d+/)) {
    throw new GradleException("Invalid versionName in version.json: ${versionNameRaw}")
}

if (!(versionCodeRaw instanceof Number) || versionCodeRaw.intValue() < 1) {
    throw new GradleException("Invalid versionCode in version.json: ${versionCodeRaw}")
}

def parsedVersionCode = versionCodeRaw.intValue()
def parsedVersionName = versionNameRaw

android {
    namespace "com.doggerz.app"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.doggerz.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode parsedVersionCode
        versionName parsedVersionName

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables {
            useSupportLibrary true
        }
    }

    signingConfigs {
        release {
            def keystorePropertiesFile = rootProject.file("keystore.properties")
            if (keystorePropertiesFile.exists()) {
                def keystoreProperties = new Properties()
                keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

                storeFile rootProject.file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        debug {
            minifyEnabled false
            shrinkResources false
        }
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    packagingOptions {
        resources {
            excludes += [
                    'META-INF/DEPENDENCIES',
                    'META-INF/LICENSE',
                    'META-INF/LICENSE.txt',
                    'META-INF/NOTICE',
                    'META-INF/NOTICE.txt',
                    'META-INF/AL2.0',
                    'META-INF/LGPL2.1'
            ]
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
    implementation project(':capacitor-app')
    implementation project(':capacitor-filesystem')
    implementation project(':capacitor-geolocation')
    implementation project(':capacitor-haptics')
    implementation project(':capacitor-keyboard')
    implementation project(':capacitor-local-notifications')
    implementation project(':capacitor-preferences')
    implementation project(':capacitor-push-notifications')
    implementation project(':capacitor-share')
    implementation project(':capacitor-splash-screen')
    implementation project(':capacitor-status-bar')
    implementation project(':capacitor-community-admob')
    implementation project(':revenuecat-purchases-capacitor')

    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "com.google.android.material:material:1.12.0"
}

apply from: 'capacitor.build.gradle'

def googleServicesFile = file('google-services.json')
if (googleServicesFile.exists()) {
    apply plugin: 'com.google.gms.google-services'
}
