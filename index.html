    <title>Doggerz</title>

    <style>
      /* Minimal boot UI so the app feels responsive before React mounts */
      :root {
        --dg-bg: #090a0f;
        --dg-fg: #e5e7eb;
        --dg-muted: rgba(229, 231, 235, 0.65);
        --dg-accent: #10b981;
        --dg-accent2: #38bdf8;
        --dg-ring: rgba(16, 185, 129, 0.55);
        color-scheme: dark;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: radial-gradient(
          circle at top,
          #1e293b 0,
          #020617 55%,
          #000 100%
        );
      }

      * {
        -webkit-tap-highlight-color: transparent;
      }

      ::selection {
        background: rgba(14, 117, 20, 0.35);
      }

      .dg-boot {
        min-height: 100vh;
        display: grid;
        place-items: center;
        gap: 14px;
        padding: 24px;
        color: var(--dg-fg);
        pointer-events: none;
        user-select: none;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
      }

      .dg-boot__card {
        width: 100%;
        max-width: 420px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.35);
        -webkit-backdrop-filter: blur(14px);
        backdrop-filter: blur(14px);
        box-shadow: 0 0 70px rgba(16, 185, 129, 0.12);
        padding: 22px 20px;
      }

      .dg-boot__row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .dg-boot__logo {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        border: 1px solid rgba(16, 185, 129, 0.35);
        background: rgba(16, 185, 129, 0.1);
        padding: 6px;
        box-sizing: border-box;
        object-fit: cover;
      }

      .dg-boot__label {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.88);
      }

      .dg-boot__hero {
        width: 192px;
        aspect-ratio: 1 / 1;
        margin: 18px auto 0;
        overflow: hidden;
        border-radius: 999px;
        border: 1px solid rgba(16, 185, 129, 0.35);
        background:
          radial-gradient(
            circle at 35% 28%,
            rgba(16, 185, 129, 0.22),
            rgba(0, 0, 0, 0) 58%
          ),
          rgba(0, 0, 0, 0.45);
        box-shadow: 0 0 60px rgba(16, 185, 129, 0.16);
        padding: 4px;
        box-sizing: border-box;
      }

      .dg-boot__hero > img {
        width: 100%;
        height: 100%;
        display: block;
        border-radius: inherit;
        object-fit: cover;
        object-position: 74% 38%;
      }

      .dg-boot__title {
        margin: 18px 0 0;
        font-size: 26px;
        line-height: 1.05;
        font-weight: 900;
        letter-spacing: 0.02em;
        text-align: center;
        color: rgba(167, 243, 208, 0.95);
        text-shadow: 0 0 18px rgba(16, 185, 129, 0.55);
      }

      .dg-boot__sub {
        margin: 6px 0 0;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-align: center;
        color: rgba(255, 255, 255, 0.9);
      }

      .dg-boot__hint {
        margin-top: 16px;
        font-size: 13px;
        text-align: center;
        color: var(--dg-muted);
      }

      .dg-boot__bar {
        width: min(420px, 100%);
        height: 10px;
        margin-top: 0;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .dg-boot__bar > span {
        display: block;
        width: 42%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(16, 185, 129, 0.25),
          rgba(56, 189, 248, 0.3)
        );
        animation: dg-boot-load 1.15s ease-in-out infinite alternate;
      }

      @keyframes dg-boot-load {
        0% {
          transform: translateX(-40%);
        }

        100% {
          transform: translateX(140%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .dg-boot__bar > span {
          width: 60%;
          transform: translateX(0);
          animation: none;
        }
      }
    </style>
