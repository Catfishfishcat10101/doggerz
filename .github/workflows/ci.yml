name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "playstore-*"
  workflow_dispatch:
    inputs:
      run_playstore:
        description: "Run Play Store strict checks (requires secrets + real assetlinks)"
        required: false
        default: "false"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Preflight
        run: npm run preflight

  verify:
    name: Verify (lint/typecheck/build/preflight)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build, preflight]
    steps:
      - name: Gate
        run: echo "All verification checks passed."

  playstore:
    name: Play Store (strict)
    runs-on: ubuntu-latest
    needs: verify
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_playstore == 'true') ||
      startsWith(github.ref, 'refs/tags/playstore-')
    env:
      # Provide these as GitHub Actions secrets for real Play Store/TWA builds.
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      # Optional; only required if you choose to enforce it via env:check flags.
      VITE_OPENWEATHER_API_KEY: ${{ secrets.VITE_OPENWEATHER_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Play Store checks
        run: npm run ci:playstore
